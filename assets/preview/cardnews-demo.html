<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>PromptCanvas 카드뉴스 데모 미리보기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #e9e9ef; padding: 24px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .card {
    position: relative;
    width: 1080px;
    height: 1080px;
    max-width: 92vmin;
    max-height: 92vmin;
    background: linear-gradient(155deg, #17122e 0%, #241646 55%, #3a1d63 100%);
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    color: #F3F1FF;
    container-type: size;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    border-radius: 18px;
  }

  /* 1080px 기준으로 디자인하고, 화면 크기에 맞게 통째로 축소 */
  .scaler {
    position: absolute;
    top: 0; left: 0;
    width: 1080px;
    height: 1080px;
    transform-origin: top left;
  }

  .glow { position: absolute; border-radius: 50%; }
  .glow-1 {
    width: 620px; height: 620px; top: -240px; right: -200px;
    background: radial-gradient(circle, rgba(124,92,252,0.55) 0%, rgba(124,92,252,0) 70%);
  }
  .glow-2 {
    width: 520px; height: 520px; bottom: -220px; left: -180px;
    background: radial-gradient(circle, rgba(244,114,182,0.35) 0%, rgba(244,114,182,0) 70%);
  }

  .inner { position: absolute; inset: 0; padding: 96px 92px; display: flex; flex-direction: column; }

  .top { display: flex; align-items: center; gap: 16px; }
  .logo-badge {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 24px; border: 1.5px solid rgba(167,139,250,0.5);
    border-radius: 100px; background: rgba(124,92,252,0.14);
  }
  .logo-mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #7C5CFC, #F472B6);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .logo-text { font-weight: 700; font-size: 26px; letter-spacing: 0.5px; color: #EDE9FF; }
  .kicker { font-weight: 500; font-size: 24px; color: #A78BFA; letter-spacing: 0.5px; }

  .headline { margin-top: auto; font-weight: 900; font-size: 108px; line-height: 1.18; letter-spacing: -2px; }
  .headline .accent { color: #F472B6; }

  .sub { margin-top: 34px; font-weight: 400; font-size: 34px; line-height: 1.55; color: #B8B2D8; max-width: 760px; }

  .steps { margin-top: 56px; display: flex; gap: 18px; }
  .step {
    flex: 1; background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.10); border-radius: 22px; padding: 28px 26px;
  }
  .step-num { font-weight: 900; font-size: 30px; color: #7C5CFC; }
  .step-label { margin-top: 10px; font-weight: 700; font-size: 30px; color: #F3F1FF; }
  .step-desc { margin-top: 6px; font-weight: 400; font-size: 22px; color: #9890BC; }

  .footer {
    margin-top: 56px; display: flex; align-items: center; justify-content: space-between;
    border-top: 1.5px solid rgba(255,255,255,0.10); padding-top: 30px;
  }
  .footer-left { font-weight: 500; font-size: 26px; color: #B8B2D8; }
  .footer-cta {
    font-weight: 700; font-size: 26px; color: #1A1530;
    background: linear-gradient(135deg, #A78BFA, #F472B6); padding: 14px 30px; border-radius: 100px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="scaler" id="scaler">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
      <div class="inner">
        <div class="top">
          <span class="logo-badge">
            <span class="logo-mark">✦</span>
            <span class="logo-text">PromptCanvas</span>
          </span>
          <span class="kicker">AI 디자인 가이드</span>
        </div>

        <h1 class="headline">
          디자인,<br>
          이제 <span class="accent">10분</span>이면<br>
          충분합니다
        </h1>

        <p class="sub">
          옵션만 고르면 프롬프트가 완성돼요.<br>
          복사해서 붙여넣으면 디자인이 나옵니다.
        </p>

        <div class="steps">
          <div class="step">
            <div class="step-num">01</div>
            <div class="step-label">고르기</div>
            <div class="step-desc">유형·분위기·컬러 선택</div>
          </div>
          <div class="step">
            <div class="step-num">02</div>
            <div class="step-label">복사하기</div>
            <div class="step-desc">맞춤 프롬프트 자동 생성</div>
          </div>
          <div class="step">
            <div class="step-num">03</div>
            <div class="step-label">붙여넣기</div>
            <div class="step-desc">AI가 디자인 완성</div>
          </div>
        </div>

        <div class="footer">
          <span class="footer-left">비개발자도 누구나 · 무료</span>
          <span class="footer-cta">지금 시작하기 →</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 카드(.card)의 실제 크기에 맞춰 1080px 디자인을 통째로 축소
    function fit() {
      var card = document.querySelector('.card');
      var s = card.clientWidth / 1080;
      document.getElementById('scaler').style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
